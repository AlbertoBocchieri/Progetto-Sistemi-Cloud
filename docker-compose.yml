services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: parcheggia-postgres
    environment:
      POSTGRES_DB: parcheggia
      POSTGRES_USER: parcheggia
      POSTGRES_PASSWORD: parcheggia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parcheggia -d parcheggia"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: parcheggia-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: parcheggia-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: parcheggia
      RABBITMQ_DEFAULT_PASS: parcheggia
    ports:
      - "5672:5672"
      - "15672:15672"
  
  zone-service:
    build:
      context: ./services/zone-service
    container_name: parcheggia-zone-service
    environment:
      DATABASE_URL: postgresql+psycopg://parcheggia:parcheggia@postgres:5432/parcheggia
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data: