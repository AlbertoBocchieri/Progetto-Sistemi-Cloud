name: ECR Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: services/api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - service: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
          - service: zone-service
            context: services/zone-service
            dockerfile: services/zone-service/Dockerfile
          - service: ingestion-service
            context: .
            dockerfile: services/ingestion-service/Dockerfile
          - service: nemotron-service
            context: services/nemotron-service
            dockerfile: services/nemotron-service/Dockerfile
          - service: prediction-service
            context: services/prediction-service
            dockerfile: services/prediction-service/Dockerfile
          - service: location-service
            context: services/location-service
            dockerfile: services/location-service/Dockerfile
          - service: admin-service
            context: services/admin-service
            dockerfile: services/admin-service/Dockerfile
    env:
      AWS_REGION: eu-south-1
      ECR_BASE: ${{ secrets.PARCHEGGIA_ECR_BASE }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.ECR_BASE }}/${{ matrix.service }}:latest
            ${{ env.ECR_BASE }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
