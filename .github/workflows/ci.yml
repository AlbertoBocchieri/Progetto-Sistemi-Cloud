name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install kubeconform
        run: |
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.8.0/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Static checks
        run: scripts/static_checks.sh

      - name: Compose smoke test
        run: |
          docker compose up --build -d || {
            docker compose ps
            echo "docker compose up returned non-zero; continuing with smoke tests."
          }
          scripts/smoke_test.sh
          scripts/e2e_demo_test.sh
          ITERATIONS=10 scripts/load_test.sh

      - name: Logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Cleanup
        if: always()
        run: docker compose down -v
