<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Selezione del punto demo Stesicoro</title>
  <desc id="desc">Pannello Stato e demo dell'app ParcheggIA con il pulsante Stesicoro evidenziato.</desc>
  <rect width="1200" height="520" fill="#07121b"/>
  <rect x="60" y="42" width="1080" height="436" rx="24" fill="#0d1b26" stroke="#284052" stroke-width="2"/>

  <text x="100" y="96" fill="#7f9aad" font-family="Arial, sans-serif" font-size="22" font-weight="700">SISTEMA</text>
  <text x="100" y="142" fill="#f4f7fa" font-family="Arial, sans-serif" font-size="38" font-weight="700">Stato e demo</text>

  <g font-family="Arial, sans-serif" font-size="21" font-weight="600">
    <rect x="100" y="172" width="190" height="54" rx="10" fill="#172a38"/>
    <text x="122" y="207" fill="#b9c9d4">GPS demo</text>
    <rect x="306" y="172" width="190" height="54" rx="10" fill="#172a38"/>
    <text x="328" y="207" fill="#b9c9d4">Radar attivo</text>
    <rect x="512" y="172" width="190" height="54" rx="10" fill="#172a38"/>
    <text x="534" y="207" fill="#b9c9d4">Raggio 500 m</text>
  </g>

  <text x="100" y="281" fill="#91a8b7" font-family="Arial, sans-serif" font-size="20" font-weight="700">POSIZIONE DEMO</text>

  <g font-family="Arial, sans-serif" font-size="23" font-weight="700" text-anchor="middle">
    <rect x="100" y="310" width="220" height="76" rx="12" fill="#1368e8" stroke="#68a8ff" stroke-width="4"/>
    <text x="210" y="357" fill="#ffffff">Stesicoro</text>

    <rect x="340" y="310" width="220" height="76" rx="12" fill="#172a38" stroke="#345064" stroke-width="2"/>
    <text x="450" y="357" fill="#d8e2e8">Borgo</text>

    <rect x="580" y="310" width="220" height="76" rx="12" fill="#172a38" stroke="#345064" stroke-width="2"/>
    <text x="690" y="357" fill="#d8e2e8">Sanzio</text>

    <rect x="820" y="310" width="220" height="76" rx="12" fill="#172a38" stroke="#345064" stroke-width="2"/>
    <text x="930" y="357" fill="#d8e2e8">Europa</text>
  </g>

  <path d="M210 432 L210 397" fill="none" stroke="#36e48b" stroke-width="6" stroke-linecap="round"/>
  <path d="M197 411 L210 394 L223 411" fill="none" stroke="#36e48b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="246" y="442" fill="#36e48b" font-family="Arial, sans-serif" font-size="25" font-weight="700">Clicca Stesicoro per tornare al centro di Catania</text>
</svg>
