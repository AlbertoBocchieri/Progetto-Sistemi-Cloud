---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parcheggia
  namespace: parcheggia
spec:
  rules:
    - host: parcheggia.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
          - path: /ingestion
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
          - path: /ai
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
