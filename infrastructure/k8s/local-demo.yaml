apiVersion: v1
kind: Namespace
metadata:
  name: parcheggia
---
apiVersion: v1
kind: Secret
metadata:
  name: parcheggia-secrets
  namespace: parcheggia
type: Opaque
stringData:
  POSTGRES_DB: parcheggia
  POSTGRES_USER: parcheggia
  POSTGRES_PASSWORD: parcheggia
  RABBITMQ_DEFAULT_USER: parcheggia
  RABBITMQ_DEFAULT_PASS: parcheggia
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: parcheggia
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: parcheggia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgis/postgis:16-3.4
          envFrom:
            - secretRef:
                name: parcheggia-secrets
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "parcheggia", "-d", "parcheggia"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: parcheggia
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-init
  namespace: parcheggia
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: postgis/postgis:16-3.4
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: parcheggia-secrets
                  key: POSTGRES_PASSWORD
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -U parcheggia -d parcheggia; do sleep 2; done
              psql -h postgres -U parcheggia -d parcheggia -f /migrations/001_create_zones.sql
          volumeMounts:
            - name: zone-migrations
              mountPath: /migrations
      volumes:
        - name: zone-migrations
          configMap:
            name: zone-migrations
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: parcheggia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: parcheggia
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: parcheggia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          envFrom:
            - secretRef:
                name: parcheggia-secrets
          ports:
            - containerPort: 5672
            - containerPort: 15672
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: parcheggia
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zone-service
  namespace: parcheggia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zone-service
  template:
    metadata:
      labels:
        app: zone-service
    spec:
      containers:
        - name: zone-service
          image: progetto-sistemi-cloud-zone-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              value: postgresql+psycopg://parcheggia:parcheggia@postgres:5432/parcheggia
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: RABBITMQ_URL
              value: amqp://parcheggia:parcheggia@rabbitmq:5672/%2F
            - name: EVENT_EXCHANGE
              value: parcheggia.events
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: zone-service
  namespace: parcheggia
spec:
  selector:
    app: zone-service
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prediction-service
  namespace: parcheggia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prediction-service
  template:
    metadata:
      labels:
        app: prediction-service
    spec:
      containers:
        - name: prediction-service
          image: progetto-sistemi-cloud-prediction-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              value: postgresql+psycopg://parcheggia:parcheggia@postgres:5432/parcheggia
            - name: REDIS_URL
              value: redis://redis:6379/0
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: prediction-service
  namespace: parcheggia
spec:
  selector:
    app: prediction-service
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: prediction-service
  namespace: parcheggia
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: prediction-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: location-service
  namespace: parcheggia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: location-service
  template:
    metadata:
      labels:
        app: location-service
    spec:
      containers:
        - name: location-service
          image: progetto-sistemi-cloud-location-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: RABBITMQ_URL
              value: amqp://parcheggia:parcheggia@rabbitmq:5672/%2F
            - name: EVENT_EXCHANGE
              value: parcheggia.events
            - name: ZONE_SERVICE_URL
              value: http://zone-service:8000/api/v1
            - name: PREDICTION_SERVICE_URL
              value: http://prediction-service:8000/api/v1
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: location-service
  namespace: parcheggia
spec:
  selector:
    app: location-service
  ports:
    - port: 8000
      targetPort: 8000
