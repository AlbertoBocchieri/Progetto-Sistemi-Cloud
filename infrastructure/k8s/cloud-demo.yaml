apiVersion: v1
kind: Namespace
metadata:
  name: parcheggia
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-init
  namespace: parcheggia
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: postgres:16-alpine
          envFrom:
            - configMapRef:
                name: parcheggia-runtime
            - secretRef:
                name: parcheggia-secrets
          command:
            - sh
            - -c
            - |
              until pg_isready -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 2; done
              PGPASSWORD="$POSTGRES_PASSWORD" psql -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" -f /migrations/001_create_zones.sql
          volumeMounts:
            - name: zone-migrations
              mountPath: /migrations
      volumes:
        - name: zone-migrations
          configMap:
            name: zone-migrations
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zone-service
  namespace: parcheggia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zone-service
  template:
    metadata:
      labels:
        app: zone-service
    spec:
      containers:
        - name: zone-service
          image: progetto-sistemi-cloud-zone-service:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: parcheggia-runtime
            - secretRef:
                name: parcheggia-secrets
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: zone-service-app-code
              mountPath: /app/app/main.py
              subPath: main.py
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: zone-service-app-code
          configMap:
            name: zone-service-app-code
---
apiVersion: v1
kind: Service
metadata:
  name: zone-service
  namespace: parcheggia
spec:
  selector:
    app: zone-service
  ports:
    - port: 8000
      targetPort: 8000
---
